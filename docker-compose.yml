version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      # For local dev we could use a separate dev Dockerfile, but typically we just override the command.
      # However, mapping volumes to node_modules can be tricky. It's often easier to use the node image directly.
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume to prevent local node_modules from overriding container's
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      # We override the production command to enable hot reload for local dev
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/asldb
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=["http://localhost:5173"]
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: asldb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
